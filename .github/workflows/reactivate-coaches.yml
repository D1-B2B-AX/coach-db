name: Reactivate Coaches (Daily)

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 00:00 UTC (KST 09:00)
  workflow_dispatch:  # 수동 실행 가능

jobs:
  reactivate:
    runs-on: ubuntu-latest
    steps:
      - name: Reactivate coaches with past return date
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/cron/reactivate-coaches" \
            -H "Authorization: Bearer ${{ secrets.SYNC_API_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail --silent --show-error
